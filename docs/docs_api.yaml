openapi: 3.0.3
info:
  title: Fullstack Engineer Assessment API
  version: 1.0.0
  description: |
    Swagger/OpenAPI contract for the flash-sale Product and Order API.

    Prices use integer values in the smallest currency unit. Duplicate `product_id`
    entries in an order are aggregated before inventory is decremented atomically.
servers:
  - url: http://127.0.0.1:8000
    description: Local development server
tags:
  - name: Health
  - name: Products
  - name: Orders
paths:
  /up:
    get:
      tags:
        - Health
      summary: Check application health
      operationId: getHealth
      responses:
        '200':
          description: Application is running
          content:
            text/html:
              schema:
                type: string
              example: Application up
  /api/products:
    get:
      tags:
        - Products
      summary: List products with current prices and stock
      operationId: listProducts
      responses:
        '200':
          description: Product list returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
              example:
                data:
                  - id: 1
                    sku: FLASH-001
                    name: Wireless Mechanical Keyboard K87
                    regular_price: 100000
                    current_price: 10000
                    is_flash_sale_active: true
                    inventory_quantity: 10
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/orders:
    post:
      tags:
        - Orders
      summary: Create an order and atomically decrement inventory
      description: |
        Accepts 1 to 100 line items. Duplicate Product IDs are combined into one
        line before the transaction. The entire order is rolled back if any Product
        is missing or does not have enough stock.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              items:
                - product_id: 1
                  quantity: 2
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
              example:
                data:
                  id: 42
                  items:
                    - product_id: 1
                      product_name: Wireless Mechanical Keyboard K87
                      quantity: 2
                      unit_price: 10000
                      subtotal: 20000
                  total_amount: 20000
                  created_at: '2026-07-21T12:00:00.000000Z'
        '400':
          description: Request body contains malformed JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_JSON
                  message: JSON tidak valid.
        '404':
          description: One of the requested Products does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: PRODUCT_NOT_FOUND
                  message: Produk tidak ditemukan.
                  details:
                    product_id: 999
        '409':
          description: One of the requested Products has insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: OUT_OF_STOCK
                  message: Stok produk tidak mencukupi.
                  details:
                    product_id: 1
        '415':
          description: Content-Type is not application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: UNSUPPORTED_MEDIA_TYPE
                  message: Content-Type harus application/json.
        '422':
          description: Request body fails validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: Payload tidak valid.
                  details:
                    items.0.quantity:
                      - The items.0.quantity field must be at least 1.
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  responses:
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FrameworkErrorResponse'
          example:
            message: Server Error
  schemas:
    ProductListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    Product:
      type: object
      required:
        - id
        - sku
        - name
        - regular_price
        - current_price
        - is_flash_sale_active
        - inventory_quantity
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        sku:
          type: string
          example: FLASH-001
        name:
          type: string
          example: Wireless Mechanical Keyboard K87
        regular_price:
          type: integer
          format: int64
          minimum: 0
          example: 100000
        current_price:
          type: integer
          format: int64
          minimum: 0
          example: 10000
        is_flash_sale_active:
          type: boolean
          example: true
        inventory_quantity:
          type: integer
          minimum: 0
          example: 10
    CreateOrderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'
    CreateOrderItemRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        quantity:
          type: integer
          minimum: 1
          maximum: 1000
          example: 2
    CreateOrderResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Order'
    Order:
      type: object
      required:
        - id
        - items
        - total_amount
        - created_at
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 42
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        total_amount:
          type: integer
          format: int64
          minimum: 0
          example: 20000
        created_at:
          type: string
          format: date-time
          example: '2026-07-21T12:00:00.000000Z'
    OrderItem:
      type: object
      required:
        - product_id
        - product_name
        - quantity
        - unit_price
        - subtotal
      properties:
        product_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        product_name:
          type: string
          example: Wireless Mechanical Keyboard K87
        quantity:
          type: integer
          minimum: 1
          example: 2
        unit_price:
          type: integer
          format: int64
          minimum: 0
          example: 10000
        subtotal:
          type: integer
          format: int64
          minimum: 0
          example: 20000
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ApiError'
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - INVALID_JSON
            - PRODUCT_NOT_FOUND
            - OUT_OF_STOCK
            - UNSUPPORTED_MEDIA_TYPE
            - VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    FrameworkErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Server Error
